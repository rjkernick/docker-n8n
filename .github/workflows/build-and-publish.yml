name: Build and Publish n8n

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest_version: ${{ steps.set-matrix.outputs.latest_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts

      - name: Check for new versions
        id: set-matrix
        run: |
          MATRIX_JSON=$(./scripts/determine-versions.sh)
          echo "Build matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build-and-push:
    needs: check-versions
    if: ${{ needs.check-versions.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        version: ${{ fromJson(needs.check-versions.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build for testing (Local)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          build-args: |
            N8N_VERSION=${{ matrix.version }}
          tags: rjkernick/n8n:${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Permission Tests
        run: |
          ./scripts/test-permissions.sh rjkernick/n8n:${{ matrix.version }} skip-build

      - name: Run Startup Tests
        run: |
          ./scripts/test-startup.sh rjkernick/n8n:${{ matrix.version }}

      - name: Check if this version is the latest stable
        id: check_latest
        run: |
          if [ "${{ matrix.version }}" == "${{ needs.check-versions.outputs.latest_version }}" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            N8N_VERSION=${{ matrix.version }}
          tags: |
            rjkernick/n8n:${{ matrix.version }}
            ${{ steps.check_latest.outputs.is_latest == 'true' && 'rjkernick/n8n:latest' || '' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
